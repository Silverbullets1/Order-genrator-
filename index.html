<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverbullet Premium PDF</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            padding: 20px; 
            max-width: 450px; 
            margin: 40px auto; 
            background-color: #0f172a; 
            color: #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 15px 35px rgba(0,255,255,0.1);
            border: 1px solid #1e293b;
        }
        h2 { text-align: center; color: #38bdf8; letter-spacing: 3px; font-weight: 800;}
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #94a3b8; font-size: 13px; text-transform: uppercase;}
        input { 
            width: 100%; 
            padding: 14px; 
            box-sizing: border-box; 
            border: 1px solid #334155; 
            border-radius: 6px;
            background-color: #1e293b;
            color: white;
            font-size: 15px;
            transition: all 0.3s;
        }
        input:focus { outline: none; border-color: #38bdf8; box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        button { 
            width: 100%; 
            padding: 16px; 
            background: linear-gradient(135deg, #0ea5e9, #0284c7);
            color: white; 
            border: none; 
            font-size: 16px; 
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer; 
            margin-top: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            transition: opacity 0.2s;
        }
        button:hover { opacity: 0.9; }
    </style>
</head>
<body>

    <img id="storeLogo" src="logo.png" style="visibility: hidden; position: absolute; width: 1px; height: 1px;" crossorigin="anonymous">

    <h2>SILVERBULLET</h2>

    <div class="form-group">
        <label for="buyerName">Buyer Name</label>
        <input type="text" id="buyerName" placeholder="e.g. FalconAccount_store">
    </div>

    <div class="form-group">
        <label for="itemName">Items Purchased</label>
        <input type="text" id="itemName" placeholder="e.g. Gmail, x10 Twitter...">
    </div>

    <div class="form-group">
        <label for="amount">Total Amount ($)</label>
        <input type="text" id="amount" placeholder="e.g. 100">
    </div>

    <button onclick="generatePDF()">Generate Premium Receipt</button>

    <script>
        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const buyerName = document.getElementById('buyerName').value || "Valued Customer";
            const itemName = document.getElementById('itemName').value || "Digital Item";
            const amount = document.getElementById('amount').value || "0.00";

            const randomNum = Math.floor(100000 + Math.random() * 900000);
            const orderNumber = "ORD-" + randomNum;
            
            const today = new Date();
            const dateString = today.toLocaleDateString();
            const timeString = today.toLocaleTimeString();

            // --- 1. Edge-to-Edge Dark Header ---
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, 210, 45, 'F');
            
            doc.setDrawColor(14, 165, 233); 
            doc.setLineWidth(1.5);
            doc.line(0, 45, 210, 45);
            
            // --- ADDING THE LOGO (WITH SAFETY NET) ---
            try {
                const logoImg = document.getElementById('storeLogo');
                // Only try to draw the image if it actually loaded properly
                if (logoImg.complete && logoImg.naturalWidth > 0) {
                    doc.addImage(logoImg, 'PNG', 12, 8, 28, 28); 
                }
            } catch (error) {
                console.log("Logo skipped: Make sure the file is exactly named 'logo.png'");
            }

            // "SILVERBULLET" Main Title 
            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(26);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 44, 28);
            
            // Receipt Badge 
            doc.setFillColor(14, 165, 233);
            doc.rect(155, 18, 40, 12, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text("RECEIPT", 175, 26, null, null, "center");

            // --- 2. Order Metadata ---
            doc.setTextColor(80, 80, 80); 
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("ISSUED TO:", 15, 65);
            doc.text("ORDER NO:", 110, 65);
            doc.text("DATE & TIME:", 160, 65);

            doc.setTextColor(20, 20, 20); 
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(buyerName, 15, 72);
            doc.text(orderNumber, 110, 72);
            doc.text(`${dateString} ${timeString}`, 160, 72);

            // --- 3. Items Table ---
            const startY = 90;
            
            doc.setFillColor(241, 245, 249); 
            doc.rect(15, startY, 180, 12, 'F');
            
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("DESCRIPTION / ITEMS INCLUDED", 20, startY + 8);

            doc.setTextColor(40, 40, 40);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            const splitItemText = doc.splitTextToSize(itemName, 170); 
            
            const itemsHeight = (splitItemText.length * 6) + 10;
            doc.setDrawColor(226, 232, 240); 
            doc.setLineWidth(0.5);
            doc.rect(15, startY + 12, 180, itemsHeight); 
            
            doc.text(splitItemText, 20, startY + 20);

            // --- 4. Total Amount Block ---
            const totalY = startY + 12 + itemsHeight + 15;

            doc.setFillColor(14, 165, 233); 
            doc.rect(125, totalY, 70, 20, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("TOTAL PAID:", 135, totalY + 13);
            doc.text("$" + amount, 190, totalY + 13, null, null, "right");

            // --- 5. Footer ---
            const footerY = 270;
            doc.setDrawColor(226, 232, 240);
            doc.line(15, footerY - 10, 195, footerY - 10); 

            doc.setTextColor(150, 150, 150);
            doc.setFontSize(9);
            doc.setFont("helvetica", "italic");
            doc.text("This is an automatically generated digital receipt.", 105, footerY, null, null, "center");
            
            doc.setTextColor(14, 165, 233); 
            doc.setFont("helvetica", "bold");
            doc.text("Telegram Support: @Silverbullets_bot", 105, footerY + 6, null, null, "center"); 

            doc.save("Silverbullet_Receipt_" + orderNumber + ".pdf");
        }
    </script>
</body>
</html>
