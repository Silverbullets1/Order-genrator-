            const orderNumber = "ORD-" + randomNum;
            
            const today = new Date();
            const dateString = today.toLocaleDateString();
            const timeString = today.toLocaleTimeString();

            // --- 1. Edge-to-Edge Dark Header ---
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, 210, 45, 'F');
            
            doc.setDrawColor(14, 165, 233); 
            doc.setLineWidth(1.5);
            doc.line(0, 45, 210, 45);
            
            // --- ADDING THE LOGO ---
            // Places the logo at X: 15, Y: 12, Width: 20, Height: 20
            doc.addImage(storeLogoBase64, 'JPEG', 15, 12, 20, 20); // Changed to JPEG to match your .jpg file

            // "SILVERBULLET" Main Title (Shifted to X: 40 to make room for the logo)
            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(26);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 40, 28);
            
            // Receipt Badge on the right side
            doc.setFillColor(14, 165, 233);
            doc.rect(155, 18, 40, 12, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text("RECEIPT", 175, 26, null, null, "center");

            // --- 2. Order Metadata ---
            doc.setTextColor(80, 80, 80); 
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("ISSUED TO:", 15, 65);
            doc.text("ORDER NO:", 110, 65);
            doc.text("DATE & TIME:", 160, 65);

            doc.setTextColor(20, 20, 20); 
            doc.setFontSize(12);
            doc.setFont("helvetica", "normal");
            doc.text(buyerName, 15, 72);
            doc.text(orderNumber, 110, 72);
            doc.text(`${dateString} ${timeString}`, 160, 72);

            // --- 3. Items Table ---
            const startY = 90;
            
            doc.setFillColor(241, 245, 249); 
            doc.rect(15, startY, 180, 12, 'F');
            
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("DESCRIPTION / ITEMS INCLUDED", 20, startY + 8);

            doc.setTextColor(40, 40, 40);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            const splitItemText = doc.splitTextToSize(itemName, 170); 
            
            const itemsHeight = (splitItemText.length * 6) + 10;
            doc.setDrawColor(226, 232, 240); 
            doc.setLineWidth(0.5);
            doc.rect(15, startY + 12, 180, itemsHeight); 
            
            doc.text(splitItemText, 20, startY + 20);

            // --- 4. Total Amount Block ---
            const totalY = startY + 12 + itemsHeight + 15;

            doc.setFillColor(14, 165, 233); 
            doc.rect(125, totalY, 70, 20, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(14);
            doc.setFont("helvetica", "bold");
            doc.text("TOTAL PAID:", 135, totalY + 13);
            doc.text("$" + amount, 190, totalY + 13, null, null, "right");

            // --- 5. Footer ---
            const footerY = 270;
            doc.setDrawColor(226, 232, 240);
            doc.line(15, footerY - 10, 195, footerY - 10); 

            doc.setTextColor(150, 150, 150);
            doc.setFontSize(9);
            doc.setFont("helvetica", "italic");
            doc.text("This is an automatically generated digital receipt.", 105, footerY, null, null, "center");
            
            doc.setTextColor(14, 165, 233); 
            doc.setFont("helvetica", "bold");
            doc.text("Support: @Silverbullets_bot on Telegram", 105, footerY + 6, null, null, "center");

            doc.save("Silverbullet_Receipt_" + orderNumber + ".pdf");
        }
    </script>
</body>
