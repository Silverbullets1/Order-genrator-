<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverbullet Premium - Elite Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.1), transparent 25%);
            background-size: 100% 100%;
            color: var(--text-main);
        }

        /* Added smooth entrance animation */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .container {
            width: 100%;
            max-width: 480px; 
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.05);
            box-sizing: border-box;
            animation: fadeUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        h2 { 
            text-align: center; 
            color: #38bdf8; 
            letter-spacing: 4px; 
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .form-group { margin-bottom: 22px; }
        
        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="text"], input[type="number"] { 
            width: 100%; 
            padding: 15px; 
            box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px;
            background-color: rgba(0,0,0,0.2);
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus, input[type="number"]:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); 
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        .checkbox-wrapper {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-bottom: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .checkbox-wrapper:hover {
            background: rgba(0,0,0,0.3);
            border-color: rgba(14, 165, 233, 0.3);
        }

        .checkbox-wrapper input[type="checkbox"] {
            margin-right: 12px;
            width: 18px;
            height: 18px;
            accent-color: #f59e0b; 
            cursor: pointer;
        }

        .checkbox-wrapper label {
            margin-bottom: 0;
            cursor: pointer;
            color: var(--text-main);
            font-size: 14px;
            font-weight: 600;
        }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white; 
            border: none; 
            font-size: 15px; 
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer; 
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.6);
            transition: all 0.3s ease;
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px -10px rgba(14, 165, 233, 0.8);
        }
        button:active { transform: translateY(0); }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }
    </style>
</head>
<body>

    <div class="container">
        <h2>SILVERBULLET</h2>

        <form id="receiptForm">
            <div class="form-group">
                <label for="buyerName">Billed To (Name / Handle)</label>
                <input type="text" id="buyerName" placeholder="e.g. FalconAccount_store" required>
            </div>

            <div class="form-group">
                <label for="itemName">Item Description</label>
                <input type="text" id="itemName" placeholder="e.g. x10 Premium Accounts" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="amount">Total USD ($)</label>
                    <input type="number" id="amount" placeholder="e.g. 100.00" step="0.01" min="0" required onblur="this.value = parseFloat(this.value || 0).toFixed(2)">
                </div>
                <div class="form-group">
                    <label for="cryptoType">Crypto Network</label>
                    <input type="text" id="cryptoType" placeholder="e.g. USDT (BEP20)" required>
                </div>
            </div>

            <label class="checkbox-wrapper">
                <input type="checkbox" id="isReplacement">
                <label for="isReplacement">Issue as Replacement Order</label>
            </label>

            <button type="submit" id="generateBtn">Generate Elite Receipt</button>
        </form>
    </div>

    <script>
        document.getElementById('receiptForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generatePDF();
        });

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const buyerName = document.getElementById('buyerName').value.trim();
            const itemName = document.getElementById('itemName').value.trim();
            const rawAmount = document.getElementById('amount').value;
            const cryptoType = document.getElementById('cryptoType').value.trim().toUpperCase();
            
            const isReplacement = document.getElementById('isReplacement').checked;

            let cleanAmount = parseFloat(rawAmount).toFixed(2);
            if (isNaN(cleanAmount)) cleanAmount = "0.00";

            const randomNum = Math.floor(100000 + Math.random() * 900000);
            const orderNumber = "ORD-" + randomNum;
            
            const today = new Date();
            const options = { year: 'numeric', month: 'short', day: '2-digit' };
            const dateString = today.toLocaleDateString('en-US', options); 

            // --- 0. BACKGROUND WATERMARK ---
            doc.setGState(new doc.GState({opacity: 0.04})); 
            doc.setTextColor(15, 23, 42); 
            
            doc.setFontSize(75);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 105, 140, { angle: 45, align: "center" });
            
            doc.setFontSize(22);
            doc.setFont("helvetica", "normal");
            
            let subWatermark = isReplacement ? "REPLACEMENT ISSUED" : "VERIFIED SECURE TRANSACTION";
            doc.text(subWatermark, 105, 155, { angle: 45, align: "center" });

            doc.setGState(new doc.GState({opacity: 1.0}));

            // --- 1. PREMIUM HEADER ---
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, 210, 50, 'F');
            
            doc.setDrawColor(14, 165, 233); 
            doc.setLineWidth(1.5);
            doc.line(0, 50, 210, 50);

            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(28);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 15, 32);
            
            // UI Polish: Rounded corners on badges
            if (isReplacement) {
                doc.setFillColor(245, 158, 11); 
                doc.roundedRect(145, 22, 50, 12, 1.5, 1.5, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(10);
                doc.text("REPLACEMENT", 170, 30, null, null, "center");
            } else {
                doc.setFillColor(16, 185, 129); 
                doc.roundedRect(160, 22, 35, 12, 1.5, 1.5, 'F');
                doc.setTextColor(255, 255, 255);
                doc.setFontSize(11);
                doc.text("PAID", 177.5, 30, null, null, "center");
            }

            // --- 2. INVOICE METADATA ---
            doc.setDrawColor(226, 232, 240);
            doc.setLineWidth(0.5);
            
            doc.line(15, 65, 15, 85); 

            doc.setTextColor(120, 120, 120); 
            doc.setFontSize(9);
            doc.setFont("helvetica", "bold");
            doc.text("BILLED TO:", 20, 70);
            
            doc.setTextColor(30, 30, 30); 
            doc.setFontSize(13);
            doc.text(buyerName, 20, 78);

            doc.setTextColor(120, 120, 120); 
            doc.setFontSize(9);
            doc.text("RECEIPT NO:", 120, 70);
            doc.text("DATE:", 120, 78);

            doc.setTextColor(30, 30, 30); 
            doc.setFontSize(10);
            doc.text(orderNumber, 150, 70);
            doc.text(dateString, 150, 78);

            // Subtle dotted separator
            doc.setLineDash([1, 1.5], 0);
            doc.line(15, 93, 195, 93);
            doc.setLineDash([]); // reset

            // --- 3. HIGH-CONTRAST ITEMS TABLE ---
            const startY = 105;
            
            doc.setFillColor(15, 23, 42); 
            doc.rect(15, startY, 180, 12, 'F'); 
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.text("ITEM DESCRIPTION", 20, startY + 8);
            doc.text("AMOUNT", 185, startY + 8, null, null, "right");

            const splitItemText = doc.splitTextToSize(itemName, 130); 
            let itemsHeight = (splitItemText.length * 6) + 15;
            if(itemsHeight > 90) itemsHeight = 90; 

            doc.setDrawColor(200, 200, 200); 
            doc.rect(15, startY + 12, 180, itemsHeight, 'S'); 
            
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(splitItemText.slice(0, 12), 20, startY + 22);
            
            doc.setFont("helvetica", "bold");
            doc.text("$" + cleanAmount, 185, startY + 22, null, null, "right");

            // --- 4. PAYMENT METHOD & DENSER QR CODE ---
            let totalY = startY + 12 + itemsHeight + 15;
            if (totalY > 230) {
                doc.addPage();
                totalY = 20; 
            }

            let qrX = 15;
            let qrY = totalY;
            let qrSize = 25;
            let qrGrid = 22; // UI Polish: Increased grid density for realism
            let boxSize = qrSize / qrGrid;
            
            doc.setFillColor(30, 30, 30);
            for(let i=0; i<qrGrid; i++) {
                for(let j=0; j<qrGrid; j++) {
                    if (Math.random() > 0.45) {
                        doc.rect(qrX + (i*boxSize), qrY + (j*boxSize), boxSize, boxSize, 'F');
                    }
                }
            }
            // QR Anchors
            let anchorSize = 5;
            doc.setFillColor(255,255,255); doc.rect(qrX, qrY, boxSize*anchorSize, boxSize*anchorSize, 'F');
            doc.setFillColor(30,30,30); doc.rect(qrX, qrY, boxSize*anchorSize, boxSize*anchorSize, 'S'); doc.rect(qrX+boxSize, qrY+boxSize, boxSize*(anchorSize-2), boxSize*(anchorSize-2), 'F');
            
            doc.setFillColor(255,255,255); doc.rect(qrX+qrSize-boxSize*anchorSize, qrY, boxSize*anchorSize, boxSize*anchorSize, 'F');
            doc.setFillColor(30,30,30); doc.rect(qrX+qrSize-boxSize*anchorSize, qrY, boxSize*anchorSize, boxSize*anchorSize, 'S'); doc.rect(qrX+qrSize-boxSize*(anchorSize-1), qrY+boxSize, boxSize*(anchorSize-2), boxSize*(anchorSize-2), 'F');
            
            doc.setFillColor(255,255,255); doc.rect(qrX, qrY+qrSize-boxSize*anchorSize, boxSize*anchorSize, boxSize*anchorSize, 'F');
            doc.setFillColor(30,30,30); doc.rect(qrX, qrY+qrSize-boxSize*anchorSize, boxSize*anchorSize, boxSize*anchorSize, 'S'); doc.rect(qrX+boxSize, qrY+qrSize-boxSize*(anchorSize-1), boxSize*(anchorSize-2), boxSize*(anchorSize-2), 'F');

            doc.setTextColor(120, 120, 120);
            doc.setFontSize(8);
            doc.text("PAYMENT VERIFIED VIA", 48, totalY + 8);
            
            doc.setTextColor(14, 165, 233);
            doc.setFontSize(12);
            doc.setFont("helvetica", "bold");
            doc.text(cryptoType, 48, totalY + 15);

            // --- 5. TOTAL BLOCK ---
            doc.setFillColor(15, 23, 42); 
            // UI Polish: Smooth rounded corners on the total box
            doc.roundedRect(120, totalY, 75, 26, 2, 2, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            
            let totalText = isReplacement ? "REPLACEMENT VALUE" : "TOTAL PAID";
            doc.text(totalText, 125, totalY + 10);
            
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("$" + cleanAmount, 190, totalY + 18, null, null, "right");

            // --- 6. TERMS, FOOTER & SECURITY BARCODE ---
            const footerY = 265; 

            doc.setTextColor(120, 120, 120);
            doc.setFontSize(7);
            doc.setFont("helvetica", "normal");
            
            let termsText = isReplacement ? 
                "TERMS: This document serves as proof of a replacement for a previously verified digital order." : 
                "TERMS: All digital sales are final. No refunds on delivered digital goods.";
            doc.text(termsText, 15, footerY - 20);

            doc.setFillColor(50, 50, 50);
            let barcodeX = 15;
            for(let i=0; i < 30; i++) {
                let rectWidth = Math.random() * 1.5 + 0.3; 
                doc.rect(barcodeX, footerY - 15, rectWidth, 10, 'F'); 
                barcodeX += rectWidth + (Math.random() * 2 + 0.5); 
            }

            doc.setTextColor(150, 150, 150);
            doc.setFontSize(8);
            doc.setFont("helvetica", "italic");
            doc.text("Official Digital Receipt generated automatically.", 105, footerY + 2, null, null, "center");
            
            doc.setTextColor(14, 165, 233); 
            doc.setFont("helvetica", "bold");
            
            let tgText = "Telegram Support: @Silverbullets_bot";
            let tgWidth = doc.getTextWidth(tgText);
            let tgX = 105 - (tgWidth / 2);
            
            doc.textWithLink(tgText, tgX, footerY + 8, { url: 'https://t.me/Silverbullets_bot' });
            
            doc.setDrawColor(14, 165, 233);
            doc.setLineWidth(0.2);
            doc.line(tgX, footerY + 9, tgX + tgWidth, footerY + 9);

            const fileNamePrefix = isReplacement ? "Silverbullet_Replacement_" : "Silverbullet_Receipt_";
            doc.save(fileNamePrefix + orderNumber + ".pdf");

            const btn = document.getElementById('generateBtn');
            const originalText = btn.innerText;
            btn.innerText = "PDF DOWNLOADED! ✓";
            btn.classList.add("success");
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove("success");
            }, 2500);
        }
    </script>
</body>
</html>
