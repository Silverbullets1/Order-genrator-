<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Silverbullet Premium - Corporate Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    
    <style>
        :root {
            --bg-color: #020617;
            --card-bg: rgba(15, 23, 42, 0.8);
            --primary: #0ea5e9;
            --primary-hover: #0284c7;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-color); 
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(14, 165, 233, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(56, 189, 248, 0.1), transparent 25%);
            background-size: 100% 100%;
            color: var(--text-main);
        }

        .container {
            width: 100%;
            max-width: 480px; 
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            padding: 40px 30px;
            border-radius: 20px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            border: 1px solid rgba(255,255,255,0.08);
            box-sizing: border-box;
        }

        h2 { 
            text-align: center; 
            color: #38bdf8; 
            letter-spacing: 4px; 
            font-weight: 800;
            margin-top: 0;
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .form-group { margin-bottom: 22px; }
        
        label { 
            display: block; 
            font-weight: 500; 
            margin-bottom: 8px; 
            color: var(--text-muted); 
            font-size: 12px; 
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input { 
            width: 100%; 
            padding: 15px; 
            box-sizing: border-box; 
            border: 1px solid rgba(255,255,255,0.1); 
            border-radius: 8px;
            background-color: rgba(0,0,0,0.2);
            color: white;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        input:focus { 
            outline: none; 
            border-color: var(--primary); 
            background-color: rgba(0,0,0,0.4);
            box-shadow: 0 0 0 4px rgba(14, 165, 233, 0.15); 
        }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }

        button { 
            width: 100%; 
            padding: 18px; 
            background: linear-gradient(135deg, var(--primary), var(--primary-hover));
            color: white; 
            border: none; 
            font-size: 15px; 
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer; 
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px -10px rgba(14, 165, 233, 0.5);
            transition: all 0.3s ease;
        }

        button:hover { 
            transform: translateY(-3px); 
            box-shadow: 0 15px 25px -10px rgba(14, 165, 233, 0.6);
        }
        button.success { background: linear-gradient(135deg, #10b981, #059669); }
    </style>
</head>
<body>

    <div class="container">
        <h2>SILVERBULLET</h2>

        <form id="receiptForm">
            <div class="form-group">
                <label for="buyerName">Buyer Name / Handle</label>
                <input type="text" id="buyerName" placeholder="e.g. FalconAccount_store" required>
            </div>

            <div class="form-group">
                <label for="itemName">Items Purchased</label>
                <input type="text" id="itemName" placeholder="e.g. x10 Premium Accounts" required>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="amount">Total USD ($)</label>
                    <input type="number" id="amount" placeholder="e.g. 150.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label for="cryptoType">Crypto Used</label>
                    <input type="text" id="cryptoType" placeholder="e.g. USDT (TRC20)" required>
                </div>
            </div>

            <div class="form-group">
                <label for="txHash">Transaction Hash (Optional)</label>
                <input type="text" id="txHash" placeholder="Paste TxID here...">
            </div>

            <button type="submit" id="generateBtn">Generate Professional Receipt</button>
        </form>
    </div>

    <script>
        document.getElementById('receiptForm').addEventListener('submit', function(e) {
            e.preventDefault();
            generatePDF();
        });

        function generatePDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();

            const buyerName = document.getElementById('buyerName').value.trim();
            const itemName = document.getElementById('itemName').value.trim();
            const rawAmount = document.getElementById('amount').value;
            const cryptoType = document.getElementById('cryptoType').value.trim().toUpperCase();
            let txHash = document.getElementById('txHash').value.trim();
            
            if (!txHash) txHash = "N/A - Manual Verification Required";

            let cleanAmount = parseFloat(rawAmount).toFixed(2);
            if (isNaN(cleanAmount)) cleanAmount = "0.00";

            const randomNum = Math.floor(100000 + Math.random() * 900000);
            const orderNumber = "ORD-" + randomNum;
            
            const today = new Date();
            const options = { year: 'numeric', month: 'short', day: '2-digit' };
            const dateString = today.toLocaleDateString('en-US', options); 
            const timeString = today.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });

            // --- 0. BACKGROUND WATERMARK ---
            doc.setTextColor(245, 248, 250); 
            doc.setFontSize(60);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 30, 160, { angle: 45 });
            doc.text("PAID IN FULL", 50, 220, { angle: 45 });

            // --- 1. PREMIUM HEADER ---
            doc.setFillColor(15, 23, 42); 
            doc.rect(0, 0, 210, 50, 'F');
            
            // Cyan bottom border for header
            doc.setDrawColor(14, 165, 233); 
            doc.setLineWidth(1.5);
            doc.line(0, 50, 210, 50);

            doc.setTextColor(255, 255, 255); 
            doc.setFontSize(26);
            doc.setFont("helvetica", "bold");
            doc.text("SILVERBULLET", 15, 32);
            
            // Emerald Green "PAID" Badge
            doc.setFillColor(16, 185, 129); 
            doc.rect(160, 22, 35, 12, 'F');
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(11);
            doc.text("PAID", 177.5, 30, null, null, "center");

            // --- 2. INVOICE METADATA ---
            // Left Column (Billed To)
            doc.setTextColor(100, 100, 100); 
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("BILLED TO:", 15, 65);
            
            doc.setTextColor(30, 30, 30); 
            doc.setFontSize(14);
            doc.text(buyerName, 15, 73);

            // Right Column (Order Info)
            doc.setTextColor(100, 100, 100); 
            doc.setFontSize(10);
            doc.text("RECEIPT NO:", 120, 65);
            doc.text("DATE:", 120, 73);
            doc.text("TIME:", 120, 81);

            doc.setTextColor(30, 30, 30); 
            doc.text(orderNumber, 150, 65);
            doc.text(dateString, 150, 73);
            doc.text(timeString, 150, 81);

            // --- 3. ITEMS TABLE ---
            const startY = 95;
            
            // Table Header Background
            doc.setFillColor(241, 245, 249); 
            doc.setDrawColor(226, 232, 240); 
            doc.rect(15, startY, 180, 12, 'FD'); // Fill and Draw stroke
            
            doc.setTextColor(100, 100, 100);
            doc.setFontSize(10);
            doc.text("ITEM DESCRIPTION", 20, startY + 8);
            doc.text("AMOUNT", 185, startY + 8, null, null, "right");

            // Table Body
            const splitItemText = doc.splitTextToSize(itemName, 140); 
            let itemsHeight = (splitItemText.length * 6) + 15;
            if(itemsHeight > 100) itemsHeight = 100; 

            doc.rect(15, startY + 12, 180, itemsHeight, 'S'); // Draw border only
            
            doc.setTextColor(40, 40, 40);
            doc.setFontSize(11);
            doc.setFont("helvetica", "normal");
            doc.text(splitItemText.slice(0, 15), 20, startY + 22);
            
            doc.setFont("helvetica", "bold");
            doc.text("$" + cleanAmount, 185, startY + 22, null, null, "right");

            // --- 4. CRYPTO VERIFICATION BOX ---
            let paymentY = startY + 12 + itemsHeight + 10;

            doc.setDrawColor(14, 165, 233); 
            doc.setFillColor(248, 250, 252); 
            doc.setLineWidth(0.5);
            doc.rect(15, paymentY, 180, 30, 'FD');

            doc.setTextColor(14, 165, 233);
            doc.setFontSize(10);
            doc.setFont("helvetica", "bold");
            doc.text("PAYMENT VERIFIED VIA CRYPTOCURRENCY", 20, paymentY + 8);

            doc.setTextColor(80, 80, 80);
            doc.setFontSize(9);
            doc.text("NETWORK / COIN:", 20, paymentY + 16);
            doc.text("TRANSACTION ID:", 20, paymentY + 24);

            doc.setTextColor(30, 30, 30);
            doc.text(cryptoType, 55, paymentY + 16);
            
            let displayHash = txHash;
            if (displayHash.length > 50) {
                displayHash = displayHash.substring(0, 47) + "...";
            }
            doc.text(displayHash, 55, paymentY + 24);

            // --- 5. TOTAL BLOCK ---
            let totalY = paymentY + 45;

            // Page break safety
            if (totalY > 260) {
                doc.addPage();
                totalY = 20; 
            }

            doc.setFillColor(15, 23, 42); 
            doc.rect(120, totalY, 75, 25, 'F');
            
            doc.setTextColor(255, 255, 255);
            doc.setFontSize(10);
            doc.setFont("helvetica", "normal");
            doc.text("TOTAL PAID", 125, totalY + 10);
            
            doc.setFontSize(16);
            doc.setFont("helvetica", "bold");
            doc.text("$" + cleanAmount, 190, totalY + 17, null, null, "right");

            // --- 6. FOOTER / SECURITY BARCODE ---
            const footerY = 280; 

            // Barcode graphic
            doc.setFillColor(50, 50, 50);
            let barcodeX = 15;
            for(let i=0; i < 30; i++) {
                let rectWidth = Math.random() * 1.5 + 0.3; 
                doc.rect(barcodeX, footerY - 8, rectWidth, 10, 'F');
                barcodeX += rectWidth + (Math.random() * 2 + 0.5); 
            }

            // Support text
            doc.setTextColor(150, 150, 150);
            doc.setFontSize(8);
            doc.setFont("helvetica", "italic");
            doc.text("Official Digital Receipt generated automatically.", 105, footerY, null, null, "center");
            
            doc.setTextColor(14, 165, 233); 
            doc.setFont("helvetica", "bold");
            doc.text("Telegram Support: @Silverbullets_bot", 105, footerY + 5, null, null, "center"); 

            // Trigger Download
            doc.save("Silverbullet_Receipt_" + orderNumber + ".pdf");

            // UI Feedback
            const btn = document.getElementById('generateBtn');
            const originalText = btn.innerText;
            btn.innerText = "INVOICE DOWNLOADED! ✓";
            btn.classList.add("success");
            
            setTimeout(() => {
                btn.innerText = originalText;
                btn.classList.remove("success");
            }, 2500);
        }
    </script>
</body>
</html>
